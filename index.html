<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Southern Electrical Systems | Erode</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/react@18/umd/react.production.min.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><script src="https://unpkg.com/react-router-dom@6.22.3/dist/umd/react-router-dom.production.min.js"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Space+Grotesk:wght@400;700&family=Anton&display=swap" rel="stylesheet"><style>
body { margin:0; font-family: 'Inter', sans-serif; background:white; }

.text-stroke {
 -webkit-text-stroke: 1px black;
 color: transparent;
}

.btn-primary {
 padding:14px 32px;background:#E31E24;color:#fff;font-weight:bold;
 text-transform:uppercase;font-size:10px;letter-spacing:2px;
}

.btn-outline {
 padding:14px 32px;border:1px solid #E31E24;color:#E31E24;
 font-weight:bold;text-transform:uppercase;font-size:10px;letter-spacing:2px;
}

.marquee {
 display:flex;
 animation: scroll 20s linear infinite;
}

@keyframes scroll {
 0% { transform: translateX(0); }
 100% { transform: translateX(-50%); }
}
</style></head><body>
<div id="root"></div><script type="text/babel">
const { HashRouter, Routes, Route, Link } = ReactRouterDOM;

const Navbar = () => (
 <nav className="fixed w-full z-50 bg-white/90 backdrop-blur border-b">
  <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <div>
      <div className="font-black text-red-600 text-2xl tracking-tight">Southern</div>
      <div className="text-[9px] tracking-[0.3em] text-red-600">ELECTRICAL SYSTEMS</div>
    </div>
    <div className="hidden md:flex gap-8 text-xs font-bold tracking-widest">
      <Link to="/">Home</Link>
      <Link to="/expertise">Expertise</Link>
      <Link to="/gallery">Projects</Link>
      <Link to="/contact">Contact</Link>
    </div>
  </div>
 </nav>
);

const Home = () => (

      <p className="text-gray-500 mb-8 max-w-md">

      <div className="flex gap-4">

  <div className="bg-red-600 py-4 overflow-hidden">

          <p className="text-gray-500">Reduce power loss and optimize efficiency.</p>
        </div>

        <div className="p-8 border hover:border-red-600">
          <h3 className="text-2xl font-bold mb-4">Automation</h3>
          <p className="text-gray-500">PLC panels and smart industrial control.</p>
        </div>

      </div>
    </div>
  </section>
 </div>
);

const Expertise = () => (
 <div className="pt-32 px-6">
  <h1 className="text-6xl font-black mb-6">Our Expertise</h1>
  <p className="text-gray-500 max-w-xl">Textile mills, factories, and industrial setups across Tamil Nadu.</p>
 </div>
);

const Gallery = () => (
 <div className="pt-32 px-6">
  <h1 className="text-6xl font-black mb-10">Projects</h1>
  <div className="grid md:grid-cols-3 gap-4">
    {[1,2,3,4,5,6].map(i => (
      <img key={i} src={`https://picsum.photos/seed/${i}/500`} className="grayscale hover:grayscale-0 transition" />
    ))}
  </div>
 </div>
);

const Contact = () => (
 <div className="pt-32 px-6">
  <h1 className="text-6xl font-black mb-6">Contact</h1>
  <p className="mb-2">Phone: +91 XXXXX XXXXX</p>
  <p className="mb-6">Email: info@southernelectrical.in</p>

  <a href="https://wa.me/919876543210" className="btn-primary">WhatsApp Now</a>
 </div>
);

const Footer = () => (
 <footer className="border-t mt-20 py-10 text-center">
  <p className="text-gray-500">© Southern Electrical Systems</p>
 </footer>
);

const App = () => (
 <HashRouter>
  <Navbar />
  <Routes>
    <Route path="/" element={<Home />} />
    <Route path="/expertise" element={<Expertise />} />
    <Route path="/gallery" element={<Gallery />} />
    <Route path="/contact" element={<Contact />} />
  </Routes>
  <Footer />
 </HashRouter>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body>
</html>
